{% extends "base.html" %}

{% block title %}登录 | 运维管理系统{% endblock %}

{% block body %}
<div class="login-shell">
  <div class="login-card">
    <div>
      <p class="eyebrow">OPS PLATFORM</p>
      <h1>运维管理系统</h1>
      <p class="muted">先做一个能用的第一版，这里先提供登录页和后台首页骨架。</p>
    </div>

    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form-grid">
      <label>
        <span>账号</span>
        <input name="username" placeholder="请输入账号" value="admin" />
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" placeholder="请输入密码" value="admin123" />
      </label>
      <button type="submit">登录系统</button>
    </form>

    <div class="helper-text">
      演示账号：admin ，演示密码：admin123
    </div>
  </div>
</div>
{% endblock %}
