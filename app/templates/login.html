{% extends "base.html" %}

{% block title %}登录 | 运维管理系统{% endblock %}

{% block body %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </div>
      <p class="eyebrow">OPS PLATFORM</p>
      <h1>运维管理系统</h1>
      <p class="muted">请输入账号密码登录系统</p>
    </div>

    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form-grid">
      <label>
        <span>账号</span>
        <input name="username" placeholder="请输入账号" autocomplete="username" />
      </label>
      <label>
        <span>密码</span>
        <input name="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </label>
      <button type="submit">登录系统</button>
    </form>

    <div class="helper-text">
      演示账号：admin / admin123
    </div>
  </div>
</div>
{% endblock %}
